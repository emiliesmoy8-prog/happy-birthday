<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Birthday Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>С днём рождения!</h1>

    <h2>Birthday Dashboard</h2>

    <div class="section">
        <p class="label">User</p>
        <p class="value">Old Bitch</p>

        <p class="label">Age</p>
        <p class="value">34</p>
    </div>

    <hr>


    <h3>Today's Mission</h3>

    <div class="mission">
        <span>✓</span>
        <span>103 Coffee</span>
    </div>

    <div class="mission">
        <span>✓</span>
        <span>Read a good book</span>
    </div>

    <div class="mission">
        <span>✓</span>
        <span>Eat falafel wrap</span>
    </div>

    <div class="mission">
        <span>✓</span>
        <span>Laugh</span>
    </div>

    <div class="mission">
        <span>✓</span>
        <span>Dance 😉</span>
    </div>

    <div class="mission">
        <span class="spinner">⟳</span>
        <span id="loadingText">
            Do something that makes you feel alive... (Loading)
        </span>
    </div>


    <hr>

    <h3>Energy</h3>

    <div class="bar">
        <div id="energy-fill"></div>
    </div>

    <h3>Happiness</h3>

    <div class="bar">
        <div id="happy-fill"></div>
    </div>

    <hr>

    <h2>FINAL MISSION</h2>

    <p class="reward">🕷 Claim Your Reward</p>

    <button id="reward-button">
        CLAIM REWARD
    </button>

</div>

<script src="script.js"></script>

</body>

</html>
